stereo_detector:
  ros__parameters:
    model_path: "yolov8n.pt"
    confidence_threshold: 0.5
    nms_threshold: 0.45
    device: "cpu"         # "cuda" for GPU
    input_size: 320
    processing_width: 512
    max_processing_fps: 6.0
    output_width: 960
    jpeg_quality: 75
    baseline_m: 0.0578
    sync_slop_sec: 0.10
    right_buffer_size: 20
    min_depth_m: 0.3
    max_depth_m: 8.0
    depth_disparity_percentile: 70.0
